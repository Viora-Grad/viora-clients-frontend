services:
  viora.clients.frontend:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    ports:
      - '80:80'
    restart: unless-stopped

  viora.clients.frontend.dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    ports:
      - '80:80'
    restart: unless-stopped
