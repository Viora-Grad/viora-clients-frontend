<div class="flex flex-col h-full">
	<!-- Top Navbar -->
	<div class="flex items-center justify-between bg-white px-6 py-4 shadow-sm shrink-0">
		<h1 class="text-xl font-bold text-gray-900">Roles Management</h1>
		<p-button
			label="Create Role"
			icon="pi pi-plus"
			[raised]="true"
			routerLink="/roles/create"
			styleClass="!bg-primary !border-primary hover:!bg-primary-700"
		/>
	</div>

	<!-- Main Content -->
	<div class="flex-1 overflow-auto p-6">
		<div class="bg-white rounded-2xl shadow-sm flex flex-col overflow-hidden">
			<div class="overflow-auto max-h-[60vh]">
				<p-table
					[value]="roles()"
					[loading]="isLoading()"
					[tableStyle]="{ 'min-width': '40rem' }"
					[showGridlines]="false"
					[stripedRows]="false"
					styleClass="p-datatable-lg"
				>
					<ng-template #header>
						<tr>
							<th class="!text-xs !font-semibold !text-gray-400 !uppercase !tracking-wider !py-4 !px-6">Role Name</th>
							<th class="!text-xs !font-semibold !text-gray-400 !uppercase !tracking-wider !py-4 !px-6">Description</th>
						</tr>
					</ng-template>
					<ng-template #body let-role>
						<tr class="!border-b border-gray-100">
							<td class="!py-5 !px-6">
								<div class="flex items-center gap-4">
									<div class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-100 shrink-0">
										<i class="pi pi-shield text-gray-500"></i>
									</div>
									<span class="text-sm font-bold text-gray-900">{{ role.name }}</span>
								</div>
							</td>
							<td class="!py-5 !px-6">
								<span class="text-sm font-medium text-gray-900">{{ role.description || '—' }}</span>
							</td>
						</tr>
					</ng-template>
					<ng-template #emptymessage>
						<tr>
							<td colspan="2" class="!text-center !py-16">
								<div class="flex flex-col items-center gap-3">
									<div class="flex items-center justify-center w-12 h-12 rounded-full bg-gray-100">
										<i class="pi pi-shield text-gray-400"></i>
									</div>
									<span class="text-sm text-gray-500">No roles found</span>
								</div>
							</td>
						</tr>
					</ng-template>
				</p-table>
			</div>
		</div>
	</div>
</div>
